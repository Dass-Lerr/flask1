{% extends "base.html" %}

{% block content %}

<h2>Категории</h2>

<a href="{{ url_for('add_category') }}" class="btn btn-success mb-3">
    Добавить категорию
</a>

<table class="table">
    <thead>
        <tr>
            <th>Название</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for category in categories %}
        <tr>
            <td>
                <a href="{{ url_for('index', category=category.id) }}">
                    {{ category.name }}
                </a>
            </td>
            <td>
                <a href="{{ url_for('edit_category', id=category.id) }}" class="btn btn-sm btn-warning">
                    Редактировать
                </a>
                <a href="{{ url_for('delete_category', id=category.id) }}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Удалить категорию?')">
                    Удалить
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
