{% extends "base.html" %}

{% block content %}

<h2>Теги</h2>

<a href="{{ url_for('add_tag') }}" class="btn btn-success mb-3">
    Добавить тег
</a>

<table class="table">
    <thead>
        <tr>
            <th>Название</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
        <tr>
            <td>
                <a href="{{ url_for('index', tag=tag.id) }}">
                    {{ tag.name }}
                </a>
            </td>
            <td>
                <a href="{{ url_for('edit_tag', id=tag.id) }}" class="btn btn-sm btn-warning">
                    Редактировать
                </a>
                <a href="{{ url_for('delete_tag', id=tag.id) }}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Удалить тег?')">
                    Удалить
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
