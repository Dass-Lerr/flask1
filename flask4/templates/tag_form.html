{% extends "base.html" %}

{% block content %}

<h2>{{ title }}</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.name.label }}
        <br>
        {{ form.name(class="form-control") }}
    </p>

    <p>
        {{ form.submit(class="btn btn-success") }}
    </p>

</form>

{% endblock %}
